name: Build RePairip JAR
  on:
    push:
      branches: [ main ]
    workflow_dispatch:
  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3
        - uses: actions/setup-java@v3
          with:
            java-version: '17'
            distribution: 'temurin'
        - name: Build JAR
          run: ./gradlew :antik:shadowJar
        - name: Upload artifact
          uses: actions/upload-artifact@v3
          with:
            name: RePairip
            path: antik/build/libs/RePairip.jar
  